<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="style.css" rel="stylesheet">
</head>
<body>
    <div class="main-screen">
    <div id="Date-Time">
    <h2 id="clock">00:00:00</h2>
    <h3 id="date">0년 0월 0일 0요일</h3>
    </div>
    <div id="weather">
        <span></span>
        <span></span>
    </div>
    <form id="login-form" class="hidden">
    <div class="login-box">
        <input required maxlength="10" type="text" placeholder="이름을 입력하세요">
        <input value="로그인" type="submit">
    </div>
    </form>
    <h1 id="greeting" class="hidden"></h1>
    <form id="todo-form" class="hidden">
        <input type="text" placeholder="새로운 할 일을 입력하세요" required />
        <input type="submit" value="추가">
    </form>
    <ul id="todo-list" class="hidden"></ul>
    </div>
   
    
    <script src="js/form.js"></script>
    <script src="js/clock.js"></script>
    <script src="js/todo.js"></script>
    <script src="js/background.js"></script>
    <script src="js/weather.js"></script>
</body>
</html>
